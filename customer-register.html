<!DOCTYPE html>
<html>
<head>
    <title>Customer Registration</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<section class="form-section">

<h1>Customer Registration</h1>

<form action="customer-register.php" method="POST">

<input
type="text"
name="name"
placeholder="Full Name"
required>

<input
type="email"
name="email"
placeholder="Email"
required>

<input
type="text"
name="phone"
placeholder="Phone Number"
required>

<input
type="password"
name="password"
placeholder="Password"
required>

<button type="submit">
Register
</button>

</form>

<p>
Already have an account?
<a href="customer-login.html">Login</a>
</p>

</section>

</body>
</html>
