<header>

Handloom Artisan Platform

<nav>

<section class="form-section">

<h1>Join As Artisan</h1>

<form action="register_artisan.php"
      method="POST"
      enctype="multipart/form-data">

<input
type="text"
name="name"
placeholder="Full Name"
required>

<input
type="email"
name="email"
placeholder="Email"
required>

<input
type="text"
name="phone"
placeholder="Phone Number"
required>

<input
type="text"
name="location"
placeholder="Location"
required>

<input
type="text"
name="craft"
placeholder="Craft Type"
required>

<input
type="text"
name="experience"
placeholder="Experience"
required>

<input
type="file"
name="image"
required>

<input
type="password"
name="password"
placeholder="Password"
required>

<textarea
name="description"
placeholder="Tell us about your craft">
</textarea>

<button type="submit">
Register
</button>

</form>

</section>
